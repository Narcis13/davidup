<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Davidup — browser preview demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #0b0d12;
        color: #e8eaf0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px;
        gap: 16px;
      }
      header {
        text-align: center;
      }
      header h1 {
        margin: 0 0 4px;
        font-size: 18px;
        font-weight: 600;
      }
      header p {
        margin: 0;
        font-size: 13px;
        color: #9aa3b2;
      }
      canvas {
        border-radius: 6px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
        max-width: 100%;
        height: auto;
        background: #000;
      }
      .controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      button {
        background: #2a3142;
        color: #e8eaf0;
        border: 1px solid #3b4458;
        border-radius: 4px;
        padding: 6px 14px;
        font-size: 13px;
        cursor: pointer;
        font-family: inherit;
      }
      button:hover {
        background: #353d52;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .status {
        font-size: 12px;
        color: #9aa3b2;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Davidup — §3.1 hello-world</h1>
      <p>Browser preview driver: <code>attach(comp, canvas)</code> + RAF loop.</p>
    </header>
    <canvas id="stage" width="1280" height="720"></canvas>
    <div class="controls">
      <button id="replay">Replay</button>
      <button id="seek0">Seek 0s</button>
      <button id="seek1">Seek 1s</button>
      <button id="stop">Stop</button>
      <span class="status" id="status">idle</span>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
